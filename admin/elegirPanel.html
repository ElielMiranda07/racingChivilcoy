<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Elegir Panel</title>
    <link
      rel="canonical"
      href="https://www.racingclubchivilcoy.com.ar/admin/elegitPanel.html"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-Zenh87qX5JnK2Jl0vWa8Ck2rdkQ2Bzep5IDxbcnCeuOxjzrPF/et3URy9Bv1WTRi"
      crossorigin="anonymous"
    />
    <link
      href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    />
    <link rel="stylesheet" href="./css/backend.css" />
  </head>
  <body class="admin-login-body">
    <main class="admin-login-wrapper">
      <section class="admin-panel-card">
        <div class="admin-logo-wrapper mb-4">
          <img
            src="./media/akdBlanco.png"
            alt="Logo del club"
            class="admin-logo logo-club"
          />
        </div>

        <h1 class="admin-title nombre-club">Racing Club Chivilcoy</h1>

        <h4 class="admin-title">Paneles de administración</h4>

        <p class="admin-subtitle">
          Seleccioná el sistema al que querés ingresar
        </p>

        <div class="admin-panel-grid mt-4">
          <button
            id="elegirWeb"
            class="admin-panel-option d-none"
            onclick="location.href = './backend.admin.html'"
          >
            <div class="admin-panel-icon">
              <i class="bi bi-globe2"></i>
            </div>

            <div class="admin-panel-text">
              <span>Administrador Web</span>

              <small>
                Noticias, productos, imágenes y contenido institucional
              </small>
            </div>
          </button>

          <button
            id="elegirApp"
            class="admin-panel-option d-none"
            onclick="location.href = './app.backend.html'"
          >
            <div class="admin-panel-icon">
              <i class="bi bi-speedometer2"></i>
            </div>

            <div class="admin-panel-text">
              <span>Administrador App / ERP</span>

              <small>
                Socios, pagos, cuotas, actividades y configuración
              </small>
            </div>
          </button>
        </div>

        <button
          class="btn btn-outline-light w-100 mt-4"
          onclick="cerrarSesion()"
        >
          Cerrar sesión
        </button>

        <p id="mensajePanel" class="admin-message mt-3 mb-0"></p>
      </section>
    </main>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    <script src="./js/elegirPanel.js"></script>
  </body>
</html>
