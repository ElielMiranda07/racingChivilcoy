<!doctype html>
<html>
  <head>
    <title>Panel Admin</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="./app.backend.css" />
  </head>

  <body>
    <div class="container-fluid">
      <div class="row">
        <nav class="sidebar col-2 p-3 d-flex flex-column">
          <h4 id="nombreClub"></h4>

          <button
            class="btn btn-light w-100 mb-2"
            onclick="mostrar('dashboard')"
          >
            Dashboard General
          </button>

          <button
            class="btn btn-light w-100 mb-2"
            onclick="mostrar('dashboardFacturacion')"
          >
            Dashboard Facturación
          </button>

          <button
            class="btn btn-light w-100 mb-2"
            onclick="mostrar('importar')"
          >
            Crear socios
          </button>

          <button class="btn btn-light w-100 mb-2" onclick="mostrar('buscar')">
            Buscar socio
          </button>

          <button class="btn btn-light w-100 mb-2" onclick="mostrar('precios')">
            Precios
          </button>

          <button class="btn btn-light w-100 mb-2" onclick="mostrar('pagos')">
            Pagos
          </button>

          <div class="d-flex flex-column align-items-center mt-auto">
            <button
              class="btn text-white mb-3"
              onclick="mostrar('configuracion')"
              style="font-size: 1.8rem; transition: transform 0.2s"
              onmouseover="this.style.transform = 'rotate(30deg) scale(1.1)'"
              onmouseout="this.style.transform = 'rotate(0deg) scale(1)'"
              title="Configuración"
            >
              <i class="bi bi-gear-fill"></i>
            </button>

            <img
              id="logoSidebar"
              class="logo-sidebar w-100 pt-2"
              alt="Logo del club"
            />
          </div>
        </nav>

        <main class="col-10 p-4">
          <div id="dashboard" class="modulo"></div>

          <div id="dashboardFacturacion" class="modulo d-none"></div>

          <div id="importar" class="modulo d-none"></div>

          <div id="buscar" class="modulo d-none"></div>

          <div id="editar" class="modulo d-none"></div>

          <div id="precios" class="modulo d-none"></div>

          <div id="pagos" class="modulo d-none"></div>

          <div id="configuracion" class="modulo d-none"></div>
        </main>
      </div>
    </div>

    <div id="modales"></div>

    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-functions-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="./app.backend.js"></script>
    <script src="./pages/dashboardGeneral.js"></script>
    <script src="./pages/dashboardFacturacion.js"></script>
    <script src="./pages/importadorCSV.js"></script>
    <script src="./pages/buscarYEditarSocios.js"></script>
    <script src="./pages/moduloPrecios.js"></script>
    <script src="./pages/moduloPagos.js"></script>
    <script src="./pages/configuracionGeneral.js"></script>
  </body>
</html>
