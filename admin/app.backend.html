<!doctype html>
<html>
  <head>
    <title>Panel Admin</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="./css/app.backend.css" />
  </head>

  <body>
    <div class="container-fluid">
      <div class="row">
        <nav class="sidebar col-2 p-3 d-flex flex-column">
          <div class="text-center">
            <h3><strong id="nombreClub"></strong></h3>
          </div>

          <div
            class="d-flex flex-column align-items-center mb-auto"
            id="menuModulos"
          ></div>

          <div
            id="configuracionContainer"
            class="d-flex flex-column align-items-center mt-auto"
          ></div>

          <div class="d-flex flex-column align-items-center">
            <img
              id="logoSidebar"
              class="logo-sidebar w-100 pt-2"
              alt="Logo del club"
            />
          </div>
        </nav>

        <main class="col-10 p-4">
          <div id="dashboard" class="modulo"></div>

          <div id="dashboardFacturacion" class="modulo d-none"></div>

          <div id="importar" class="modulo d-none"></div>

          <div id="buscar" class="modulo d-none"></div>

          <div id="editar" class="modulo d-none"></div>

          <div id="precios" class="modulo d-none"></div>

          <div id="pagos" class="modulo d-none"></div>

          <div id="notificaciones" class="modulo d-none"></div>

          <div id="configuracion" class="modulo d-none"></div>

          <div id="usuarios" class="modulo d-none"></div>

          <div id="pileta" class="modulo d-none"></div>

          <div id="analisis" class="modulo d-none"></div>
        </main>
      </div>
    </div>

    <div id="modales"></div>

    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-functions-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <script src="./js/app.backend.js"></script>
    <script src="./js/dashboardGeneral.js"></script>
    <script src="./js/dashboardFacturacion.js"></script>
    <script src="./js/importadorCSV.js"></script>
    <script src="./js/buscarYEditarSocios.js"></script>
    <script src="./js/moduloPrecios.js"></script>
    <script src="./js/moduloPagos.js"></script>
    <script src="./js/configuracionGeneral.js"></script>
    <script src="./js/notificaciones.js"></script>
    <script src="./js/usuarios.js"></script>
    <script src="./js/moduloAnalisis.js"></script>
  </body>
</html>
