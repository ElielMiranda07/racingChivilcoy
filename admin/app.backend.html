<!doctype html>
<html>
  <head>
    <title>Panel Admin</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="./app.backend.css" />
  </head>

  <body>
    <div class="container-fluid">
      <div class="row">
        <nav class="col-2 bg-dark text-white vh-100 p-3">
          <h4>Admin</h4>

          <button
            class="btn btn-light w-100 mb-2"
            onclick="mostrar('dashboard')"
          >
            Dashboard
          </button>

          <button
            class="btn btn-light w-100 mb-2"
            onclick="mostrar('importar')"
          >
            Importar CSV
          </button>

          <button class="btn btn-light w-100 mb-2" onclick="mostrar('buscar')">
            Buscar socio
          </button>
        </nav>

        <main class="col-10 p-4">
          <div id="dashboard" class="modulo"></div>

          <div id="importar" class="modulo d-none"></div>

          <div id="buscar" class="modulo d-none"></div>

          <div id="editar" class="modulo d-none"></div>
        </main>
      </div>
    </div>

    <div class="modal fade" id="modalSocios" tabindex="-1">
      <div class="modal-dialog modal-lg">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Listado de socios</h5>
            <button class="btn-close" data-bs-dismiss="modal"></button>
          </div>

          <div class="modal-body">
            <div id="listaSocios"></div>

            <button
              id="btnCargarMas"
              class="btn btn-secondary mt-3 w-100"
              onclick="cargarMasSocios()"
            >
              Cargar más
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>

    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-functions-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-storage-compat.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script src="./app.backend.js"></script>
  </body>
</html>
