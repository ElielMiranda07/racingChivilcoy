<!doctype html>
<html>
  <head>
    <title>Panel Admin</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="./app.backend.css" />
  </head>

  <body>
    <div class="container-fluid">
      <div class="row">
        <nav class="sidebar col-2 bg-dark text-white p-3 d-flex flex-column">
          <h4>Admin</h4>

          <button
            class="btn btn-light w-100 mb-2"
            onclick="mostrar('dashboard')"
          >
            Dashboard General
          </button>

          <button
            class="btn btn-light w-100 mb-2"
            onclick="mostrar('dashboardFacturacion')"
          >
            Dashboard Facturación
          </button>

          <button
            class="btn btn-light w-100 mb-2"
            onclick="mostrar('importar')"
          >
            Crear socios
          </button>

          <button class="btn btn-light w-100 mb-2" onclick="mostrar('buscar')">
            Buscar socio
          </button>

          <button class="btn btn-light w-100 mb-2" onclick="mostrar('precios')">
            Precios
          </button>

          <button class="btn btn-light w-100 mb-2" onclick="mostrar('pagos')">
            Pagos
          </button>

          <div class="d-flex justify-content-center mt-auto">
            <img
              class="logo-sidebar w-100 pt-3"
              src="../media/img15-khvwTVqnO-transformed_preview_rev_1.png"
              alt=""
            />
          </div>
        </nav>

        <main class="col-10 p-4">
          <div id="dashboard" class="modulo"></div>

          <div id="dashboardFacturacion" class="modulo d-none"></div>

          <div id="importar" class="modulo d-none"></div>

          <div id="buscar" class="modulo d-none"></div>

          <div id="editar" class="modulo d-none"></div>

          <div id="precios" class="modulo d-none"></div>

          <div id="pagos" class="modulo d-none"></div>
        </main>
      </div>
    </div>

    <div id="modales"></div>

    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-functions-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="./app.backend.js"></script>
  </body>
</html>
