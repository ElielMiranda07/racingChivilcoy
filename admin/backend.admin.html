<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />
    <title>Backend-Administrador</title>
    <link
      rel="canonical"
      href="https://www.racingclubchivilcoy.com.ar/admin/backend.admin.html"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    />
    <link rel="stylesheet" href="./css/backend.css" />
  </head>
  <body class="admin-dashboard-body">
    <div class="admin-layout">
      <!-- SIDEBAR -->
      <aside id="adminSidebar" class="admin-sidebar">
        <div class="sidebar-brand">
          <img
            src="./media/akdBlanco.png"
            alt="Logo del club"
            class="sidebar-logo logo-club"
          />

          <div>
            <h1 class="sidebar-title nombre-club">Racing Club Chivilcoy</h1>

            <p class="sidebar-subtitle">Admin Web</p>
          </div>
        </div>

        <nav class="sidebar-nav">
          <button
            class="sidebar-link active"
            data-modulo="clicks"
            type="button"
          >
            <i class="bi bi-bar-chart-fill"></i>
            <span>Contadores de clicks</span>
          </button>

          <button class="sidebar-link" data-modulo="partidos" type="button">
            <i class="bi bi-calendar-event-fill"></i>
            <span>Carga de partidos</span>
          </button>

          <button class="sidebar-link" data-modulo="noticias" type="button">
            <i class="bi bi-newspaper"></i>
            <span>Carga de noticias</span>
          </button>

          <button class="sidebar-link" data-modulo="productos" type="button">
            <i class="bi bi-box-seam-fill"></i>
            <span>Carga de productos</span>
          </button>
        </nav>

        <div class="sidebar-footer">
          <button class="sidebar-logout" type="button" onclick="cerrarSesion()">
            <i class="bi bi-box-arrow-left"></i>
            <span>Cerrar sesión</span>
          </button>
        </div>
      </aside>

      <!-- CONTENIDO -->
      <main class="admin-main">
        <!-- TOPBAR -->
        <header class="admin-topbar">
          <button
            id="btnToggleSidebar"
            class="btn-sidebar-mobile"
            type="button"
          >
            <i class="bi bi-list"></i>
          </button>

          <div>
            <h2 id="tituloModulo" class="admin-page-title">
              Contadores de clicks
            </h2>

            <p id="subtituloModulo" class="admin-page-subtitle">
              Métricas de interacción del sitio web
            </p>
          </div>

          <div class="admin-user-box">
            <i class="bi bi-person-circle"></i>

            <div>
              <strong id="adminNombre">Administrador</strong>
              <span id="adminEmail">-</span>
            </div>
          </div>
        </header>

        <!-- CONTENEDOR DINÁMICO -->
        <section id="contenedorModulo" class="admin-content">
          <div class="admin-loading-card">
            <div class="spinner-border" role="status"></div>

            <p class="mt-3 mb-0">Cargando módulo...</p>
          </div>
        </section>
      </main>
    </div>

    <!-- FIREBASE -->
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-storage-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>

    <!-- BOOTSTRAP -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- MÓDULOS WEB -->
    <script src="./js/clicks.js"></script>
    <script src="./js/partidos.js"></script>
    <script src="./js/noticias.js"></script>
    <script src="./js/productos.js"></script>

    <!-- CORE ADMIN WEB -->
    <script src="./js/backendAdmin.js"></script>
  </body>
</html>
